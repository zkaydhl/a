<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- PWA 必备标签 -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#b87eb5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f33f.png">
    
    <title>清禾后花园</title>
    <!-- 引入 FontAwesome 图标库与 CryptoJS 加密库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --moon-opacity: 1;
            /* 使用 RGB 变量来完美兼容所有的 rgba() 动态计算 */
            --bg-grad-1: 216, 180, 248; 
            --bg-grad-2: 255, 204, 225;
            --bg-grad-3: 238, 224, 255;
            --bg-grad-4: 255, 218, 233;
            
            --bg-base: #fbf6fa;
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0.15) 100%);
            --glass-border: rgba(255, 255, 255, 0.65);
            --text-main: #5c4366; 
            --text-muted: rgba(92, 67, 102, 0.65);
            --btn-glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.1) 100%);
            --accent-color: #b87eb5; 
        }

        body.theme-night {
            --bg-base: #0f0a14;
            --bg-grad-1: 60, 35, 90; 
            --bg-grad-2: 85, 45, 85;
            --bg-grad-3: 30, 15, 50;
            --bg-grad-4: 45, 20, 55;
            
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #dfcce8; 
            --text-muted: rgba(223, 204, 232, 0.5);
            --btn-glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            --accent-color: #c99bc6; 
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Noto Serif SC", "STKaiti", "KaiTi", serif;
            -webkit-tap-highlight-color: transparent;
            /* 彻底禁用系统长按菜单，保障手势识别 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(at 20% 20%, rgba(var(--bg-grad-1), calc(0.85 * var(--moon-opacity))) 0px, transparent 55%),
                radial-gradient(at 80% 20%, rgba(var(--bg-grad-2), calc(0.85 * var(--moon-opacity))) 0px, transparent 55%),
                radial-gradient(at 80% 80%, rgba(var(--bg-grad-3), calc(0.7 * var(--moon-opacity))) 0px, transparent 55%),
                radial-gradient(at 20% 80%, rgba(var(--bg-grad-4), calc(0.7 * var(--moon-opacity))) 0px, transparent 55%);
            background-attachment: fixed;
            
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; /* 允许内容从顶部开始流，防裁剪 */
            align-items: center;
            padding: 50px 20px 40px 20px;
            overflow-x: hidden; 
            overflow-y: auto;   /* 彻底解锁纵向滑动 */
            
            color: var(--text-main);
            transition: background-color 3s ease, color 2s ease; 
            perspective: 1200px; 
            animation: breath 8s infinite ease-in-out; 
        }

        @keyframes breath {
            0%, 100% { background-size: 100% 100%; }
            50% { background-size: 115% 115%; }
        }

        #stardust-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 100;
        }

        #fog-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 900; opacity: 0; transition: opacity 2s ease;
        }
        body.fogged #fog-canvas { opacity: 1; pointer-events: auto; touch-action: none; }

        .herbal-shadow {
            position: fixed; bottom: -2vh; left: 50%; width: 60vw; height: 40vh;
            transform: translateX(-50%); z-index: 1; pointer-events: none; opacity: 0.15;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 100 C40 60, 20 40, 10 30 C30 45, 45 70, 50 100 M50 100 C60 60, 80 40, 90 30 C70 45, 55 70, 50 100" stroke="%23b87eb5" fill="none" stroke-width="1.5"/></svg>') no-repeat center bottom;
            background-size: contain;
            animation: sway 12s infinite ease-in-out alternate; filter: blur(2px);
        }
        body.theme-night .herbal-shadow { opacity: 0.08; filter: blur(3px); }
        @keyframes sway {
            from { transform: translateX(-50%) rotate(-4deg); }
            to { transform: translateX(-50%) rotate(4deg); }
        }

        .header { text-align: center; margin-bottom: 10px; z-index: 20; padding: 10px; transform: translateZ(40px); cursor: pointer; }
        .header h1 { font-size: 1.6rem; font-weight: 300; letter-spacing: 6px; color: var(--text-main); text-shadow: 0 4px 15px rgba(255, 255, 255, 0.2); }
        .art-text { font-family: "Georgia", serif; font-size: 2.3rem; font-style: italic; color: var(--accent-color); margin-right: 12px; }

        .timekeeper {
            font-size: 0.75rem; color: var(--text-muted); letter-spacing: 2px; font-weight: 300;
            margin-bottom: 25px; transform: translateZ(30px); z-index: 20; text-align: center;
        }

        .glass-container {
            width: 100%; max-width: 440px; background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-radius: 28px; border: 1px solid var(--glass-border); padding: 24px 20px;
            position: relative; z-index: 10; transform-style: preserve-3d; transition: all 1.5s ease;
            margin: auto 0; 
        }

        body.time-stop .glass-container { background: transparent; border-color: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; box-shadow: none; }
        body.time-stop .btn-grid { opacity: 0; pointer-events: none; transform: translateZ(0) scale(0.9); }
        body.time-stop .footer-wrapper { transform: translateY(-20vh) translateZ(50px) scale(1.1); }
        body.time-stop .love-quote { opacity: 1; text-shadow: 0 0 20px rgba(255,255,255,0.8); }

        .btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; transform: translateZ(30px); transition: all 1s ease; }

        .glass-btn {
            background: var(--btn-glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); border-radius: 14px; padding: 12px 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-main); font-size: 0.85rem; font-weight: 400; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.2s ease;
        }
        .full-width { grid-column: span 2; flex-direction: row; gap: 12px; justify-content: flex-start; padding: 14px 20px; }
        .glass-btn i { font-size: 1.15rem; margin-bottom: 6px; color: var(--accent-color); }
        .full-width i { margin-bottom: 0; font-size: 1.25rem; }
        .glass-btn:active { transform: translateY(2px) scale(0.95); background: var(--glass-bg); border-color: var(--accent-color); }

        #editable-card { background: var(--glass-bg); border: 1px dashed rgba(184, 126, 181, 0.3); justify-content: center; }
        /* 【彻底修复】：移除滤镜，保持绝对清晰 */
        .card-text { width: 100%; text-align: center; outline: none; word-break: break-all; transition: all 1.5s ease; opacity: 1; }
        #editable-card:not(.editing) .card-text { opacity: 0.95; }
        
        .glass-btn.editing { background: var(--bg-base); border: 1px solid var(--accent-color) !important; transform: scale(1.02); }

        .footer-wrapper { display: flex; flex-direction: column; align-items: center; margin-top: 25px; z-index: 20; transition: all 1.5s ease; padding-bottom: 20px; }
        .love-quote { font-family: "STKaiti", "KaiTi", serif; font-size: 0.95rem; color: var(--text-main); opacity: 0.9; margin-bottom: 12px; max-width: 92%; line-height: 1.6; transition: all 1.5s ease; text-align: center; cursor: pointer; }
        .love-quote.fade-out { opacity: 0; filter: blur(8px); transform: scale(0.95); }
        .copyright { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 3px; cursor: pointer; }

        #night-anchor-orb {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 160, 220, 0.8) 0%, transparent 70%);
            z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 2s ease;
        }
        body.anchor-active #night-anchor-orb { opacity: 1; animation: bpm60 2s infinite ease-in-out; }
        body.anchor-active .glass-container, body.anchor-active .header, body.anchor-active .timekeeper, body.anchor-active .footer-wrapper { opacity: 0 !important; filter: blur(10px); }
        @keyframes bpm60 { 0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } }

        .fog-btn { position: fixed; bottom: 20px; right: 20px; font-size: 0.8rem; color: var(--text-muted); z-index: 30; opacity: 0.3; cursor: pointer; padding: 10px; }
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: rgba(92, 67, 102, 0.85); color: #fff; padding: 10px 18px; border-radius: 14px; font-size: 0.85rem; opacity: 0; transition: 0.4s; z-index: 1000; pointer-events: none; }
        #toast.show { opacity: 1; top: 45px; }
        #loader { position: fixed; top: 15px; right: 15px; font-size: 0.85rem; color: var(--accent-color); background: rgba(255,255,255,0.4); padding: 5px 12px; border-radius: 20px; z-index: 2000; display: none; }
        #auth-status { position: fixed; top: 15px; left: 15px; font-size: 1.1rem; color: #ff4d4f; z-index: 2000; display: none; }
    </style>
</head>
<body>
    <div class="herbal-shadow"></div>
    <canvas id="stardust-canvas"></canvas>
    <canvas id="fog-canvas"></canvas>
    <div id="night-anchor-orb"></div>

    <!-- 顶部长按调出密钥管家 -->
    <div class="header" 
         onclick="if(!window.isLongPressFired) initGyroscope()"
         onmousedown="startPress(event, handleBackupRestore)"
         onmouseup="cancelPress(event)"
         onmouseleave="cancelPress(event)"
         ontouchstart="startPress(event, handleBackupRestore)"
         ontouchend="cancelPress(event)"
         ontouchmove="cancelPress(event)"
         oncontextmenu="return false;">
        <h1><span class="art-text">清禾</span>后花园</h1>
    </div>
    
    <div class="timekeeper" id="timekeeper">已相守 0 天 0 小时 0 分 0 秒</div>

    <div class="glass-container" id="tilt-card">
        <div class="btn-grid" id="btn-grid-container">
            <button class="glass-btn full-width"><i class="fa-solid fa-spinner fa-spin"></i><span class="btn-text">核心数据读取中...</span></button>
        </div>
    </div>

    <div class="footer-wrapper">
        <div id="love-quote" class="love-quote" onclick="triggerNextQuote()">加载中...</div>
        <div class="copyright" id="copyright-anchor">&mdash;&nbsp; 清禾 &nbsp;&mdash;</div>
    </div>
    
    <div class="fog-btn" onclick="toggleFog()"><i class="fa-solid fa-snowflake"></i></div>
    
    <div id="toast"></div>
    <div id="loader"><i class="fa-solid fa-spinner fa-spin"></i></div>
    <div id="auth-status"><i class="fa-solid fa-unlock-keyhole"></i></div>

    <script>
        // ==========================================
        // 核心配置区
        // ==========================================
        const GITHUB_OWNER = 'zkaydhl'; 
        const GITHUB_REPO = 'zkaydhl.github.io';       
        const CONFIG_FILE_PATH = 'config.json';     
        const BRANCH = 'main';   
        const LOVE_START_DATE = new Date('2019-05-02T00:00:00');                   

        // ==========================================
        // 核心交互：全局长按引擎 (替代双击)
        // ==========================================
        window.longPressTimer = null;
        window.isLongPressFired = false;
        window.pressStartX = 0;
        window.pressStartY = 0;

        function startPress(e, callback) {
            if (e.touches && e.touches.length > 0) {
                window.pressStartX = e.touches[0].clientX;
                window.pressStartY = e.touches[0].clientY;
            }
            window.isLongPressFired = false;
            window.longPressTimer = setTimeout(() => {
                window.isLongPressFired = true;
                if(navigator.vibrate) navigator.vibrate(40); // 震动反馈告知长按成功
                callback();
            }, 600); // 长按 600ms 触发
        }

        function cancelPress(e) {
            // 防抖，允许极小幅度的手抖动
            if (e && e.type === 'touchmove' && e.touches && e.touches.length > 0) {
                const dx = e.touches[0].clientX - window.pressStartX;
                const dy = e.touches[0].clientY - window.pressStartY;
                if(Math.sqrt(dx*dx + dy*dy) < 10) return; 
            }
            clearTimeout(window.longPressTimer);
            // 延时重置，以拦截伴随松手产生的 click 事件
            setTimeout(() => { window.isLongPressFired = false; }, 300);
        }

        // ==========================================
        // 月相与环境光
        // ==========================================
        function updateTheme() {
            const cycle = 29.5305882;
            const phase = ((new Date().getTime() / 86400000 - new Date('1970-01-07T20:35:00').getTime() / 86400000) % cycle) / cycle;
            let lum = phase < 0.5 ? 0.5 + phase : 1.5 - phase;
            document.documentElement.style.setProperty('--moon-opacity', lum.toFixed(2));
            const hour = new Date().getHours();
            document.body.className = (hour >= 18 || hour < 6) ? 'theme-night' : '';
        }
        updateTheme(); setInterval(updateTheme, 60000);

        setInterval(() => {
            const diff = new Date() - LOVE_START_DATE;
            document.getElementById('timekeeper').innerText = `已相守 ${Math.floor(diff/86400000)} 天 ${Math.floor((diff/3600000)%24)} 小时 ${Math.floor((diff/60000)%60)} 分 ${Math.floor((diff/1000)%60)} 秒`;
        }, 1000);

        // ==========================================
        // 画布动效区 (星河 / 起雾)
        // ==========================================
        const ctxStar = document.getElementById('stardust-canvas').getContext('2d');
        let particles = [];
        function resizeCanvas() { ctxStar.canvas.width = window.innerWidth; ctxStar.canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function animateStardust() {
            ctxStar.clearRect(0, 0, ctxStar.canvas.width, ctxStar.canvas.height);
            ctxStar.fillStyle = document.body.classList.contains('theme-night') ? 'rgba(201, 155, 198, ' : 'rgba(184, 126, 181, ';
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i]; p.x += p.speedX; p.y += p.speedY; p.life -= 0.02;
                if (p.life > 0) { ctxStar.globalAlpha = p.life; ctxStar.beginPath(); ctxStar.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctxStar.fill(); } 
                else { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animateStardust);
        }
        animateStardust();
        document.addEventListener('touchmove', (e) => {
            for(let i=0; i<2; i++) particles.push({x: e.touches[0].clientX, y: e.touches[0].clientY, size: Math.random()*2+1, speedX: (Math.random()-0.5)*1.5, speedY: (Math.random()-0.5)*1.5, life: 1});
        }, {passive: true});
        document.addEventListener('mousemove', (e) => {
            for(let i=0; i<2; i++) particles.push({x: e.clientX, y: e.clientY, size: Math.random()*2+1, speedX: (Math.random()-0.5)*1.5, speedY: (Math.random()-0.5)*1.5, life: 1});
        });

        const ctxFog = document.getElementById('fog-canvas').getContext('2d');
        let isFogged = false;
        function toggleFog() {
            isFogged = !isFogged;
            if(isFogged) {
                ctxFog.canvas.width = window.innerWidth; ctxFog.canvas.height = window.innerHeight;
                ctxFog.fillStyle = 'rgba(255, 255, 255, 0.75)'; ctxFog.fillRect(0, 0, ctxFog.canvas.width, ctxFog.canvas.height);
                ctxFog.lineCap = 'round'; ctxFog.lineJoin = 'round'; ctxFog.lineWidth = 45;
                document.body.classList.add('fogged'); showToast("❄️ 窗户起雾了");
            } else document.body.classList.remove('fogged');
        }
        function wipeFog(e) {
            e.preventDefault(); 
            let x = e.touches ? e.touches[0].clientX : e.clientX; let y = e.touches ? e.touches[0].clientY : e.clientY;
            ctxFog.globalCompositeOperation = 'destination-out'; ctxFog.lineTo(x, y); ctxFog.stroke(); ctxFog.beginPath(); ctxFog.moveTo(x, y);
        }
        const fogC = document.getElementById('fog-canvas');
        fogC.addEventListener('touchstart', (e) => { ctxFog.beginPath(); ctxFog.moveTo(e.touches[0].clientX, e.touches[0].clientY); fogC.addEventListener('touchmove', wipeFog, {passive: false}); }, {passive: false});
        fogC.addEventListener('touchend', () => fogC.removeEventListener('touchmove', wipeFog));

        // ==========================================
        // 结界与黑夜之锚
        // ==========================================
        const tiltCard = document.getElementById('tilt-card');
        let timeStopTimer, anchorTimer, anchorStartY;
        
        tiltCard.addEventListener('touchstart', (e) => {
            if(e.target.closest('.glass-btn')) return;
            anchorStartY = e.touches[0].clientY;
            timeStopTimer = setTimeout(() => { document.body.classList.add('time-stop'); if(navigator.vibrate) navigator.vibrate(50); }, 1200);
        });
        tiltCard.addEventListener('touchmove', (e) => { if(Math.abs(e.touches[0].clientY - anchorStartY) > 10) clearTimeout(timeStopTimer); }, {passive: true});
        tiltCard.addEventListener('touchend', () => { clearTimeout(timeStopTimer); document.body.classList.remove('time-stop'); });

        const copyAnchor = document.getElementById('copyright-anchor');
        copyAnchor.addEventListener('touchstart', (e) => {
            anchorStartY = e.touches[0].clientY;
            if(new Date().getHours() >= 21 || new Date().getHours() < 6) anchorTimer = setTimeout(() => { document.body.classList.add('anchor-active'); if(navigator.vibrate) navigator.vibrate(50); }, 1200);
            else showToast("🌙 待夜深人静时");
        });
        copyAnchor.addEventListener('touchmove', (e) => { if(Math.abs(e.touches[0].clientY - anchorStartY) > 10) clearTimeout(anchorTimer); }, {passive: true});
        copyAnchor.addEventListener('touchend', () => { clearTimeout(anchorTimer); document.body.classList.remove('anchor-active'); });

        let gyroEnabled = false;
        function initGyroscope() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') { bindGyroscope(); showToast("🌟 3D 空间已激活"); }
                }).catch(console.error);
            } else { bindGyroscope(); }
        }
        function bindGyroscope() {
            gyroEnabled = true;
            window.addEventListener("deviceorientation", (e) => {
                if(!e.beta || !e.gamma) return;
                const x = Math.max(-15, Math.min(15, e.beta - 45)) / 2; 
                const y = Math.max(-15, Math.min(15, e.gamma)) / 2;
                tiltCard.style.transform = `rotateX(${-x}deg) rotateY(${y}deg)`;
            }, true);
        }

        // ==========================================
        // 核心数据拉取与解密引擎
        // ==========================================
        let currentConfig = {
            'btn-gv': { type: 'tel', value: '+15134528504', labelName: 'Google Voice 拨号', updateText: true },
            'btn-tg': { type: 'url', value: 'https://t.me/S_ohye', labelName: 'Telegram 链接', updateText: false },
            'btn-sig1': { type: 'url', value: 'https://signal.me/#eu/Sohye.01', labelName: 'Signal 1 链接', updateText: false },
            'btn-sig2': { type: 'url', value: 'https://signal.me/#eu/XSohye.01', labelName: 'Signal 2 链接', updateText: false },
            'btn-wx1': { type: 'copy', value: 'S_ohye', labelName: 'wechat 账号', updateText: false },
            'btn-wx2': { type: 'copy', value: 'GS_ohye', labelName: 'wechat 账号', updateText: false },
            'btn-wx3': { type: 'copy', value: 'X_Sohye', labelName: 'wechat 账号', updateText: false },
            'btn-wx4': { type: 'copy', value: 'LSD_Awaits', labelName: 'wechat 账号', updateText: false },
            'btn-wx5': { type: 'copy', value: 'XSohye', labelName: 'wechat 账号', updateText: false },
            'btn-wx6': { type: 'copy', value: 'GSohye', labelName: 'wechat 账号', updateText: false },
            'btn-qq1': { type: 'url', value: 'https://qm.qq.com/q/sN4qlwcFaK', labelName: 'QQ 1 链接', updateText: false },
            'btn-qq2': { type: 'url', value: 'https://qm.qq.com/q/KRDTjjZCuW', labelName: 'QQ 2 链接', updateText: false },
            'btn-qq3': { type: 'url', value: 'https://qm.qq.com/q/6M3QXQtas8', labelName: 'QQ 3 链接', updateText: false },
            'btn-qq4': { type: 'url', value: 'https://qm.qq.com/q/kG9SsHCI80', labelName: 'QQ 4 链接', updateText: false },
            'btn-mail1': { type: 'email', value: 'zkaydhl@gmail.com', labelName: 'Gmail 1 邮箱', updateText: false },
            'btn-mail2': { type: 'email', value: 'baoxbing@gmail.com', labelName: 'Gmail 2 邮箱', updateText: false },
            'btn-sub1': { type: 'copy', value: 'https://link.oness.xyz/link/U3RpRccH6QoAuIbw?clash=4', labelName: '翻墙订阅 1', updateText: false },
            'btn-sub2': { type: 'copy', value: 'https://liangxin.xyz/api/v1/liangxin?OwO=bfd1cb6c35304d706f3be5eddb9ec76f', labelName: '翻墙订阅 2', updateText: false },
            'memo-card': { type: 'memo', value: '长按留下时光的印记', labelName: '无字情书', updateText: false }
        };
        let fileSha = null;

        const encodeBase64 = str => btoa(unescape(encodeURIComponent(str)));
        const decodeBase64 = str => decodeURIComponent(escape(atob(str)));
        const encryptData = (data, key) => CryptoJS.AES.encrypt(JSON.stringify(data), key).toString();
        const decryptDataObj = (ciphertext, key) => JSON.parse(CryptoJS.AES.decrypt(ciphertext, key).toString(CryptoJS.enc.Utf8));

        document.addEventListener('DOMContentLoaded', async () => {
            initLoveQuote(); 
            if (GITHUB_OWNER === 'YOUR_GITHUB_USERNAME') { renderUI(currentConfig); return; }

            document.getElementById('loader').style.display = 'block';
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${CONFIG_FILE_PATH}?ref=${BRANCH}&t=${new Date().getTime()}`);
                if (res.ok) {
                    const data = await res.json(); fileSha = data.sha;
                    const fetchedContent = JSON.parse(decodeBase64(data.content));
                    
                    if (fetchedContent.encrypted) {
                        let aesKey = localStorage.getItem('qinghe_aes_key');
                        let decryptedConfig = null;
                        while (!decryptedConfig) {
                            if (!aesKey) {
                                // 隐藏了 0000 自毁提示，但功能依然保留
                                aesKey = prompt("🔒 远端已加密，请输入解密主密码：");
                                if (aesKey === "0000") { localStorage.clear(); location.reload(); return; }
                                if (!aesKey) break;
                            }
                            try {
                                decryptedConfig = decryptDataObj(fetchedContent.data, aesKey);
                                localStorage.setItem('qinghe_aes_key', aesKey); 
                            } catch (e) { alert("❌ 密钥错误！"); aesKey = null; localStorage.removeItem('qinghe_aes_key'); }
                        }
                        if (decryptedConfig) currentConfig = decryptedConfig;
                    } else { currentConfig = fetchedContent; }
                    
                    if (!currentConfig['btn-sub1']) { currentConfig['btn-sub1'] = defaultActions['btn-sub1']; currentConfig['btn-sub2'] = defaultActions['btn-sub2']; }
                }
            } catch(e) {} 
            finally { document.getElementById('loader').style.display = 'none'; renderUI(currentConfig); }
        });

        function renderUI(config) {
            const container = document.getElementById('btn-grid-container');
            container.innerHTML = '';
            
            // 按钮注入全局的长按引擎 (取代双击)
            const renderBtn = (id, icon, defaultText, isFull = false) => {
                if(!config[id]) return '';
                const display = config[id].updateText ? config[id].value : defaultText;
                return `<button id="${id}" class="glass-btn ${isFull?'full-width':''}" 
                            onclick="if(!window.isLongPressFired) executeAction('${id}')" 
                            onmousedown="startPress(event, () => editAction('${id}'))" 
                            onmouseup="cancelPress(event)" 
                            onmouseleave="cancelPress(event)" 
                            ontouchstart="startPress(event, () => editAction('${id}'))" 
                            ontouchend="cancelPress(event)" 
                            ontouchmove="cancelPress(event)" 
                            oncontextmenu="return false;">
                            <i class="${icon}"></i><span class="btn-text">${display}</span>
                        </button>`;
            };

            let html = '';
            html += renderBtn('btn-gv', 'fa-solid fa-phone-volume', '', true);
            html += renderBtn('btn-tg', 'fa-brands fa-telegram', 'Telegram', true);
            html += renderBtn('btn-sig1', 'fa-solid fa-comment-dots', 'Signal');
            html += renderBtn('btn-sig2', 'fa-solid fa-comment-dots', 'Signal');
            for(let i=1; i<=6; i++) html += renderBtn(`btn-wx${i}`, 'fa-brands fa-weixin', 'wechat');
            for(let i=1; i<=4; i++) html += renderBtn(`btn-qq${i}`, 'fa-brands fa-qq', 'QQ');
            html += renderBtn('btn-mail1', 'fa-solid fa-envelope', 'Email');
            html += renderBtn('btn-mail2', 'fa-solid fa-envelope', 'Email');
            html += renderBtn('btn-sub1', 'fa-solid fa-satellite-dish', '清禾');
            html += renderBtn('btn-sub2', 'fa-solid fa-satellite-dish', '清禾');
            
            const memoText = config['memo-card'] ? config['memo-card'].value : '长按留下时光的印记';
            html += `<div class="glass-btn full-width" id="editable-card" 
                        onmousedown="startPress(event, () => enableMemoEdit(document.getElementById('editable-card')))" 
                        onmouseup="cancelPress(event)" 
                        onmouseleave="cancelPress(event)" 
                        ontouchstart="startPress(event, () => enableMemoEdit(document.getElementById('editable-card')))" 
                        ontouchend="cancelPress(event)" 
                        ontouchmove="cancelPress(event)" 
                        oncontextmenu="return false;">
                        <div class="card-text">${memoText}</div>
                    </div>`;
            
            container.innerHTML = html;
        }

        let isSessionUnlocked = false; let sessionTimer = null;
        function resetSessionTimer() {
            if (!isSessionUnlocked) return;
            clearTimeout(sessionTimer);
            sessionTimer = setTimeout(() => {
                isSessionUnlocked = false; document.getElementById('auth-status').style.display = 'none';
                document.removeEventListener('touchstart', resetSessionTimer);
            }, 3 * 60 * 1000); 
        }
        function requireAuth() {
            if (isSessionUnlocked) { resetSessionTimer(); return true; }
            const pwd = prompt("🔒 请验证幽灵防线密码：");
            if (pwd === "0000") { localStorage.clear(); location.reload(); return false; } 
            if (pwd === "@1264&9621^ZhBingBing*#55134.") { 
                isSessionUnlocked = true; document.getElementById('auth-status').style.display = 'block';
                document.addEventListener('touchstart', resetSessionTimer); resetSessionTimer(); showToast("🔓 已解锁，3分钟免密"); return true; 
            }
            if (pwd !== null) alert("密码错误！"); return false;
        }

        function executeAction(id) {
            const cfg = currentConfig[id];
            if (!cfg) return;
            if (cfg.type === 'tel') { copyText(cfg.value, '号码'); setTimeout(() => { window.location.href = 'tel:' + cfg.value; }, 600); } 
            else if (cfg.type === 'url') { window.location.href = cfg.value; } 
            else if (cfg.type === 'copy') { copyText(cfg.value, cfg.labelName); } 
            else if (cfg.type === 'email') { window.location.href = 'mailto:' + cfg.value; }
        }

        async function editAction(id) {
            if (!requireAuth()) return;
            const newVal = prompt(`修改 ${currentConfig[id].labelName}：\n当前数据：${currentConfig[id].value}\n\n新数据：`, currentConfig[id].value);
            if (newVal !== null && newVal.trim() !== '' && newVal !== currentConfig[id].value) {
                currentConfig[id].value = newVal.trim(); await syncToGitHub(id);
            }
        }

        function enableMemoEdit(container) {
            const textNode = container.querySelector('.card-text');
            if (textNode.getAttribute('contenteditable') === 'true') return;
            if (!requireAuth()) return;
            textNode.setAttribute('contenteditable', 'true'); container.classList.add('editing'); textNode.focus();
            showToast("🔓 已进入编辑模式。空白处点击保存。");
            
            textNode.addEventListener('blur', async function autoSave() {
                textNode.setAttribute('contenteditable', 'false'); container.classList.remove('editing');
                textNode.removeEventListener('blur', autoSave);
                if (currentConfig['memo-card'].value !== textNode.innerHTML) {
                    currentConfig['memo-card'].value = textNode.innerHTML; await syncToGitHub('memo-card');
                }
            });
        }

        function handleBackupRestore() {
            if (!requireAuth()) return;
            const choice = prompt("📦 极客密钥管家\n【1】导出备份\n【2】恢复备份\n输入 1 或 2：");
            if (choice === '1') {
                const ghToken = localStorage.getItem('qinghe_gh_token');
                const aesKey = localStorage.getItem('qinghe_aes_key');
                if (!ghToken || !aesKey) return alert("无完整密钥。");
                const pin = prompt("🔐 设置备份密码：");
                if (!pin) return;
                const backupData = JSON.stringify({ gh: ghToken, aes: aesKey });
                const blob = new Blob([encryptData(backupData, pin)], {type: "text/plain;charset=utf-8"});
                const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Qinghe_Keys.bak"; a.click();
            } else if (choice === '2') {
                const input = document.createElement('input'); input.type = 'file'; input.accept = '.bak';
                input.onchange = e => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = res => {
                        const pin = prompt("🔓 备份密码：");
                        try {
                            const decrypted = JSON.parse(decryptDataStr(res.target.result, pin));
                            localStorage.setItem('qinghe_gh_token', decrypted.gh); localStorage.setItem('qinghe_aes_key', decrypted.aes);
                            alert("✅ 恢复成功！"); location.reload();
                        } catch (err) { alert("❌ 密码错误或损坏！"); }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }
        }

        async function syncToGitHub(elementId) {
            if (GITHUB_OWNER === 'YOUR_GITHUB_USERNAME') return alert("请先配置 GITHUB 变量。");
            let token = localStorage.getItem('qinghe_gh_token');
            if (!token) { token = prompt("请输入 GitHub Token："); if (!token) return; localStorage.setItem('qinghe_gh_token', token); }
            let aesKey = localStorage.getItem('qinghe_aes_key');
            if (!aesKey) { aesKey = prompt("🔒 请设置加密主密码："); if (!aesKey) return; localStorage.setItem('qinghe_aes_key', aesKey); }

            document.getElementById('loader').style.display = 'block';
            try {
                const encryptedDataStr = encryptData(currentConfig, aesKey);
                const payloadStr = JSON.stringify({ encrypted: true, data: encryptedDataStr }, null, 2);
                const bodyData = { message: `Update: ${elementId}`, content: encodeBase64(payloadStr), branch: BRANCH };
                if (fileSha) bodyData.sha = fileSha;

                const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${CONFIG_FILE_PATH}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(bodyData)
                });
                if (res.ok) { const responseData = await res.json(); fileSha = responseData.content.sha; renderUI(currentConfig); } 
                else { const errorMsg = await res.json(); if(errorMsg.message.includes('Bad credentials')) localStorage.removeItem('qinghe_gh_token'); alert("同步失败: " + errorMsg.message); }
            } catch (err) {} finally { document.getElementById('loader').style.display = 'none'; }
        }

        function copyText(text, typeName) {
            if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(text).then(() => { showToast(`已复制 ${typeName}`); }).catch(() => fallbackCopyText(text, typeName)); } 
            else { fallbackCopyText(text, typeName); }
        }
        function fallbackCopyText(text, typeName) {
            const textArea = document.createElement("textarea"); textArea.value = text;
            textArea.style.position = "fixed"; textArea.style.opacity = "0"; document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            try { document.execCommand('copy'); showToast(`已复制 ${typeName}`); } catch (err) {}
            document.body.removeChild(textArea);
        }
        function showToast(message) {
            const toast = document.getElementById("toast"); toast.innerText = message; toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2200);
        }

        const loveQuotes = [
            "“你的一颦一笑，是我在这人间见过的最美风景。”", "“我爱你，如鲸向海，如鸟投林，退无可退，避无可避。”", 
            "“你是我平淡岁月里，最温柔的星辰。”", "“遇见你之后，世间所有的浪漫都有了具体的模样。”", 
            "“这世界纵然喧嚣，我的眼底只偏爱你。”", "“想借你心头的月亮，照亮我半生的迷茫。”", 
            "“我的世界因为你，才有了光怪陆离的色彩。”", "“在这漫长而又短暂的一生中，我想每天都对你说早安。”",
            "“你是我藏在微风里的欢喜，也是我跌入梦境的星河。”", "“我将永远忠于自己，披星戴月奔向你。”",
            "“人间烟火，山河远阔，无一是你，无一不是你。”", "“你什么都不用做，就赢得了我所有的温柔。”",
            "“风行过万里，月沉过海底，我遇见了这世上唯一契合的你。”", "“想把你写在风里，这样全世界都能读到我的爱意。”",
            "“只要看着你，我眼底的冰雪就能瞬间融化成春水。”", "“这世间美好的事物有太多，但能让我心动的，只有你一个。”",
            "“我对你的爱，就像这不落的星辰，永恒且璀璨。”", "“你是我漫长黑夜里的灯塔，指引我走向黎明。”",
            "“我的灵魂中有一片荒芜，直到你来，它开满了鲜花。”", "“爱你是这浩瀚宇宙赋予我最神圣的宿命。”"
        ];
        
        function initLoveQuote() {
            let quotePool = JSON.parse(localStorage.getItem('qinghe_quote_pool_v6'));
            if (!quotePool || quotePool.length === 0) {
                quotePool = Array.from({length: loveQuotes.length}, (_, i) => i);
                for (let i = quotePool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [quotePool[i], quotePool[j]] = [quotePool[j], quotePool[i]];
                }
            }
            const selectedIndex = quotePool.pop();
            localStorage.setItem('qinghe_quote_pool_v6', JSON.stringify(quotePool));
            document.getElementById('love-quote').innerText = loveQuotes[selectedIndex];
        }

        function triggerNextQuote() {
            const quoteEl = document.getElementById('love-quote');
            if (navigator.vibrate) navigator.vibrate([15]); 
            quoteEl.classList.add('fade-out'); 
            setTimeout(() => {
                let quotePool = JSON.parse(localStorage.getItem('qinghe_quote_pool_v6')) || [];
                if (quotePool.length === 0) {
                    quotePool = Array.from({length: loveQuotes.length}, (_, i) => i);
                    for (let i = quotePool.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [quotePool[i], quotePool[j]] = [quotePool[j], quotePool[i]];
                    }
                }
                const selectedIndex = quotePool.pop();
                localStorage.setItem('qinghe_quote_pool_v6', JSON.stringify(quotePool));
                
                quoteEl.innerText = loveQuotes[selectedIndex];
                quoteEl.classList.remove('fade-out'); 
            }, 1500); 
        }
    </script>
